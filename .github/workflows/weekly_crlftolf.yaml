name: Fix CRLF Endings

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

jobs:
  fix-crlf:
    name: Fix CRLF Endings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Find and fix CRLF endings
        run: |
          find . -type f \
            -not -path './.git/*' \
            -not -name '*.png' \
            -not -name '*.jpg' \
            -not -name '*.bin' \
            -exec grep -l $'\r' {} \; | while read file; do
            dos2unix -k "$file"
            echo "Fixed: $file"
          done

      - name: Commit if needed
        uses: EndBug/add-and-commit@v9
        with:
          message: "bot: fix CRLF line endings"
          default_author: github_actions
