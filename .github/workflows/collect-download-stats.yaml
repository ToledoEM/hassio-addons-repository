name: Collect Weekly Download Stats

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  REGISTRY: ghcr.io

jobs:
  collect-stats:
    name: Collect download statistics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create stats collection script
        run: |
          cat > collect_stats.py << 'EOF'
          #!/usr/bin/env python3
          import json
          import requests
          import csv
          import os
          from datetime import datetime

          OWNER = "${{ github.repository_owner }}"
          REPO = "${{ github.event.repository.name }}"
          PACKAGES = [
              "bentopdf",
              "manyfold_solo",
              "stirling_pdf",
              "stirling_pdf_full",
              "nginx_webserver_proxy"
          ]

          TOKEN = "${{ secrets.GITHUB_TOKEN }}"

          def get_release_downloads(package_name):
              """Fetch download count from GitHub Releases for a specific package"""
              try:
                  url = f"https://api.github.com/repos/{OWNER}/{REPO}/releases"
                  headers = {}
                  if TOKEN:
                      headers["Authorization"] = f"Bearer {TOKEN}"
                  headers["Accept"] = "application/vnd.github+json"

                  response = requests.get(url, headers=headers)

                  if response.status_code == 200:
                      releases = response.json()
                      total_downloads = 0
                      for release in releases:
                          if release["tag_name"].startswith(f"{package_name}-"):
                              for asset in release.get("assets", []):
                                  total_downloads += asset.get("download_count", 0)
                      return total_downloads
                  else:
                      print(f"  Error: {response.status_code}")
                      return 0
              except Exception as e:
                  print(f"Error fetching stats for {package_name}: {e}")
                  return 0

          def append_to_csv(stats):
              """Append statistics to download_stats.csv"""
              csv_file = "download_stats.csv"
              file_exists = os.path.isfile(csv_file)

              with open(csv_file, 'a', newline='') as f:
                  writer = csv.writer(f)
                  if not file_exists:
                      writer.writerow(["date", "bentopdf", "manyfold_solo", "stirling_pdf", "stirling_pdf_full", "nginx_webserver_proxy"])
                  row = [stats["date"]] + [stats[pkg] for pkg in PACKAGES]
                  writer.writerow(row)

          def main():
              print("Collecting download statistics from GitHub Releases...")
              stats = {"date": datetime.now().strftime("%Y-%m-%d")}

              for package in PACKAGES:
                  print(f"Fetching stats for {package}...")
                  downloads = get_release_downloads(package)
                  stats[package] = downloads
                  print(f"  {package}: {downloads} downloads")

              append_to_csv(stats)
              print("Stats appended to download_stats.csv")

          if __name__ == "__main__":
              main()
          EOF
        shell: bash

      - name: Install dependencies
        run: pip install requests

      - name: Run stats collection
        run: python collect_stats.py

      - name: Display stats
        run: |
          echo "=== Checking for CSV ==="
          if [ -f "download_stats.csv" ]; then
            echo "=== Download Statistics ==="
            cat download_stats.csv
          else
            echo "ERROR: download_stats.csv not found"
            ls -la
          fi

      - name: Commit and push stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet download_stats.csv; then
            echo "No changes to commit"
          else
            git add download_stats.csv
            git commit -m "chore: update download stats"
            git push
          fi
