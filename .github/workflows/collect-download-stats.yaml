name: Collect Weekly Download Stats

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  REGISTRY: ghcr.io

jobs:
  collect-stats:
    name: Collect download statistics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect download stats
        run: |
          OWNER="${{ github.repository_owner }}"
          PACKAGES=("bentopdf" "manyfold_solo" "stirling_pdf" "stirling_pdf_full" "nginx_webserver_proxy")
          FILE="download_stats.csv"
          WEEK=$(date '+%Y-W%W')

          # Create CSV header if doesn't exist
          if [ ! -f "$FILE" ]; then
            echo "week,bentopdf,manyfold_solo,stirling_pdf,stirling_pdf_full,nginx_webserver_proxy" > "$FILE"
          fi

          # Check if this week already recorded
          if grep -q "^$WEEK" "$FILE"; then
            echo "Week $WEEK already recorded, skipping"
            exit 0
          fi

          # Collect stats for each package
          STATS="$WEEK"
          for PKG in "${PACKAGES[@]}"; do
            TOTAL=0
            for ARCH in amd64 aarch64; do
              PKG_NAME="$PKG-$ARCH"
              URL="https://github.com/$OWNER/hassio-addons-repository/pkgs/container/$PKG_NAME/latest"
              COUNT=0
              RETRY=0

              until [ -n "$COUNT" ] || [ "$RETRY" -ge 10 ]; do
                COUNT=$(curl --connect-timeout 5 -f -s -L "$URL" | \
                  awk '/Total downloads/{getline; print}' | \
                  awk -F '<|>' '{print $3}' | \
                  tr -d ',' )
                [ -z "$COUNT" ] && sleep 5 && ((RETRY++))
              done

              [ -z "$COUNT" ] && COUNT=0
              TOTAL=$((TOTAL + COUNT))
              echo "$PKG-$ARCH: $COUNT"
            done
            STATS="$STATS,$TOTAL"
          done

          echo "$STATS" >> "$FILE"
          echo "Stats appended to $FILE"
          cat "$FILE"

      - name: Commit and push stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add download_stats.csv

          if git diff --quiet --cached download_stats.csv; then
            echo "No changes to commit"
          else
            git commit -m "chore: update download stats"
            git push
          fi
