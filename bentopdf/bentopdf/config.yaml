name: "BentoPDF"
slug: bentopdf
description: "Privacy-first PDF toolkit. 50+ tools, all processing client-side in the browser. Files never leave your device."
version: "2.5.0"
url: "https://github.com/ToledoEM/BentoPDF_HA_app/tree/main/bentopdf"
arch:
  - amd64
  - aarch64
startup: application
init: false
stage: stable

ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "BentoPDF Web UI"

webui: "http://[HOST]:[PORT:8080]"
watchdog: "http://[HOST]:[PORT:8080]/"

panel_icon: mdi:file-pdf-box
panel_title: BentoPDF

options:
  log_level: "info"

schema:
  log_level: list(info|debug|warn|error)
